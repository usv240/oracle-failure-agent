steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/oracle:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/oracle:latest
      - .

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/oracle']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - oracle
      - --image=gcr.io/$PROJECT_ID/oracle:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --port=8080
      - --timeout=300
      - --set-env-vars=MONGODB_DB_NAME=oracle_db,APP_PORT=8080,OUTPUT_DIR=outputs
      - --update-secrets=MONGODB_URI=oracle-mongodb-uri:latest,GEMINI_API_KEY=oracle-gemini-key:latest,VOYAGE_API_KEY=oracle-voyage-key:latest,GOOGLE_PROJECT_ID=oracle-gcp-project:latest,GOOGLE_LOCATION=oracle-gcp-region:latest

images:
  - gcr.io/$PROJECT_ID/oracle:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/oracle:latest

options:
  logging: CLOUD_LOGGING_ONLY
